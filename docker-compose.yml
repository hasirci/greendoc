services:
  web:
    image: barisgreenvisor/greenvisor:web-security-20250223
    container_name: greenvisor-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=https://greenvisor.tr
    networks:
      - greenvisor-network

  cbam-api:
    image: barisgreenvisor/greenvisor:cbam-api-latest
    container_name: greenvisor-cbam-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - CBAM_API_ALLOW_ORIGINS=${CBAM_API_ALLOW_ORIGINS:-http://localhost:3000,${NEXT_PUBLIC_SITE_URL}}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PORT=8080
    networks:
      - greenvisor-network

  ghg-api:
    image: barisgreenvisor/greenvisor:ghg-api-latest
    container_name: greenvisor-ghg-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - GHG_API_ALLOW_ORIGINS=${GHG_API_ALLOW_ORIGINS:-http://localhost:3000,${NEXT_PUBLIC_SITE_URL}}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PORT=8080
    networks:
      - greenvisor-network

  nginx:
    image: barisgreenvisor/greenvisor:nginx-security-20250223
    container_name: greenvisor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=greenvisor.tr
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-www:/var/www/certbot:rw
    depends_on:
      - web
      - cbam-api
      - ghg-api
    networks:
      - greenvisor-network

networks:
  greenvisor-network:
    driver: bridge
