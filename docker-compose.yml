services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: greenvisor-postgres-prod
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-greenvisor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - greenvisor-network
    # Production'da port expose etmeyin, sadece internal network'te erişilebilir olmalı
    # ports:
    #   - "5432:5432"

  # Next.js web application (Production)
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - greenvisor-web:latest
    image: greenvisor-web:latest
    container_name: greenvisor-web-prod
    # Port removed - only accessible through nginx reverse proxy
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Supabase Configuration
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Database
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-greenvisor}}
      # Application Configuration
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_PRODUCT_NAME=${NEXT_PUBLIC_PRODUCT_NAME:-GreenVisor}
      - NEXT_PUBLIC_SITE_TITLE=${NEXT_PUBLIC_SITE_TITLE:-GreenVisor - ESG Management Platform}
      - NEXT_PUBLIC_SITE_DESCRIPTION=${NEXT_PUBLIC_SITE_DESCRIPTION:-Comprehensive ESG management and sustainability reporting platform}
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE:-tr}
      - NEXT_PUBLIC_DEFAULT_THEME_MODE=${NEXT_PUBLIC_DEFAULT_THEME_MODE:-system}
      - NEXT_PUBLIC_THEME_COLOR=${NEXT_PUBLIC_THEME_COLOR:-#3b82f6}
      - NEXT_PUBLIC_THEME_COLOR_DARK=${NEXT_PUBLIC_THEME_COLOR_DARK:-#1e40af}
      # Sentry Configuration (optional)
      - SENTRY_ORG=${SENTRY_ORG}
      - SENTRY_PROJECT=${SENTRY_PROJECT}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      # API URLs
      - NEXT_PUBLIC_CBAM_API_URL=${NEXT_PUBLIC_CBAM_API_URL:-http://cbam-api:8080}
      - NEXT_PUBLIC_GHG_API_URL=${NEXT_PUBLIC_GHG_API_URL:-http://ghg-api:8080}
    depends_on:
      postgres:
        condition: service_healthy
      cbam-api:
        condition: service_started
      ghg-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - greenvisor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Python FastAPI for CBAM (Production)
  cbam-api:
    build:
      context: ./services/cbam-api
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - greenvisor-cbam-api:latest
    image: greenvisor-cbam-api:latest
    container_name: greenvisor-cbam-api-prod
    ports:
      - "${CBAM_API_PORT:-8080}:8080"
    environment:
      - CBAM_API_ALLOW_ORIGINS=${CBAM_API_ALLOW_ORIGINS:-http://localhost:3000,${NEXT_PUBLIC_SITE_URL}}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PORT=8080
    restart: unless-stopped
    networks:
      - greenvisor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Python FastAPI for GHG (Production)
  ghg-api:
    build:
      context: ./services/ghg-api
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - greenvisor-ghg-api:latest
    image: greenvisor-ghg-api:latest
    container_name: greenvisor-ghg-api-prod
    ports:
      - "${GHG_API_PORT:-8081}:8080"
    environment:
      - GHG_API_ALLOW_ORIGINS=${GHG_API_ALLOW_ORIGINS:-http://localhost:3000,${NEXT_PUBLIC_SITE_URL}}
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - PORT=8080
    restart: unless-stopped
    networks:
      - greenvisor-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
      cache_from:
        - greenvisor-nginx:latest
    image: greenvisor-nginx:latest
    container_name: greenvisor-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:rw
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - web
      - cbam-api
      - ghg-api
    restart: unless-stopped
    networks:
      - greenvisor-network
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: greenvisor-certbot-prod
    volumes:
      - certbot-www:/var/www/certbot:rw
      - certbot-conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped
    networks:
      - greenvisor-network

volumes:
  postgres-data:
    driver: local
  certbot-www:
    driver: local
  certbot-conf:
    driver: local

networks:
  greenvisor-network:
    driver: bridge
