services:
  web:
    image: barisgreenvisor/greenvisor:web-security-20250223
    container_name: greenvisor-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=https://greenvisor.tr
    networks:
      - greenvisor-network

  nginx:
    image: barisgreenvisor/greenvisor:nginx-security-20250223
    container_name: greenvisor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=greenvisor.tr
    depends_on:
      - web
    networks:
      - greenvisor-network

networks:
  greenvisor-network:
    driver: bridge
